<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spice Heaven 🌶️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:sans-serif;background:#fff8f0;}
header {background:#1a0a00;color:#fff;display:flex;justify-content:space-between;padding:15px;}
nav a {color:#fff;margin:0 10px;text-decoration:none;}
.menu-grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px;}
.food-card {background:#fff;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.food-card img {width:100%;height:180px;object-fit:cover;}
.card-body {padding:15px;}
.price {color:#ff4500;font-weight:bold;}
button {background:#1a0a00;color:#fff;border:none;padding:8px 15px;cursor:pointer;border-radius:5px;}
button:hover {background:#ff4500;}
#toast {position:fixed;bottom:20px;right:20px;background:#1a0a00;color:#fff;padding:10px;border-radius:5px;display:none;}
</style>

</head>
<body>

<header>
<h2>🌶️ Spice Heaven</h2>
<nav>
<a href="#">Home</a>
<a href="#">Menu</a>
</nav>
</header>

<h2 style="text-align:center;">Our Menu</h2>

<div class="menu-grid" id="menuGrid">

<div class="food-card" data-cat="main">
<img src="https://images.unsplash.com/photo-1604068549290-dea0e4a305ca?fit=crop&w=600&q=80">
<div class="card-body">
<h3>Margherita Pizza</h3>
<p>Classic pizza with cheese</p>
<span class="price">₹299</span>
<button onclick="placeOrder('Pizza')">Order</button>
</div>
</div>

<div class="food-card" data-cat="main">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?fit=crop&w=600&q=80">
<div class="card-body">
<h3>Cheese Burger</h3>
<p>Juicy burger</p>
<span class="price">₹249</span>
<button onclick="placeOrder('Burger')">Order</button>
</div>
</div>

<div class="food-card" data-cat="main">
<img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?fit=crop&w=600&q=80">
<div class="card-body">
<h3>Spaghetti Alfredo</h3>
<p>Creamy pasta</p>
<span class="price">₹279</span>
<button onclick="placeOrder('Pasta')">Order</button>
</div>
</div>

<div class="food-card" data-cat="snack">
<img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?fit=crop&w=600&q=80">
<div class="card-body">
<h3>Caesar Salad</h3>
<p>Healthy salad</p>
<span class="price">₹199</span>
<button onclick="placeOrder('Salad')">Order</button>
</div>
</div>

<div class="food-card" data-cat="dessert">
<img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?fit=crop&w=600&q=80">
<div class="card-body">
<h3>Chocolate Lava Cake</h3>
<p>Sweet dessert</p>
<span class="price">₹179</span>
<button onclick="placeOrder('Cake')">Order</button>
</div>
</div>

<div class="food-card" data-cat="main">
<img src="https://images.unsplash.com/photo-1553621042-f6e147245754?fit=crop&w=600&q=80">
<div class="card-body">
<h3>Sushi Platter</h3>
<p>Fresh sushi rolls</p>
<span class="price">₹399</span>
<button onclick="placeOrder('Sushi')">Order</button>
</div>
</div>

</div>

<div id="toast"></div>

<script>
function placeOrder(item){
  const toast = document.getElementById("toast");
  toast.innerText = item + " ordered successfully!";
  toast.style.display = "block";
  setTimeout(()=>{ toast.style.display="none"; },2000);
}
</script>

</body>
</html>
